[profile.default]
src = "src"
out = "out"
libs = ["../lib", "lib"]
test = "test"
script = "script"
cache_path = "cache"
solc = "0.8.28"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false
fs_permissions = [{ access = "read", path = "./" }]

remappings = [
    "@openzeppelin/contracts/=../lib/openzeppelin-contracts/contracts/",
    "@chainlink/contracts/=../lib/chainlink-brownie-contracts/contracts/src/v0.8/",
    "forge-std/=../lib/forge-std/src/"
]

[profile.ci]
fuzz = { runs = 256 }
invariant = { runs = 64 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "thousands"

[etherscan]
# Configure per-network API keys when deploying to mainnet/testnets.
